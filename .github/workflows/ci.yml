name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smart_user
          POSTGRES_PASSWORD: smart_password
          POSTGRES_DB: smart_inspection_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: smart_inspection

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: smart_inspection/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://smart_user:smart_password@localhost:5432/smart_inspection_db
          SECRET_KEY: ci-test-secret-key
          REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://smart_user:smart_password@localhost:5432/smart_inspection_db
          SECRET_KEY: ci-test-secret-key
          REDIS_URL: redis://localhost:6379/0
          ALLOWED_ORIGINS: http://localhost:3000
        run: pytest tests/ -v --tb=short || echo "No tests found — skipping"

  flutter:
    name: Flutter (Android)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smart_inspection_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test || echo "No tests found — skipping"

      - name: Build debug APK
        run: flutter build apk --debug
